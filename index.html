<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninky</title>
</head>
<body>
    <h1>🚨 満了アラート</h1>
    <div id="officerList"></div>
    <script>
        function renderOfficerList(officers) {
            const today = new Date();
            const expiredOfficers = officers.filter(officer => new Date(officer.expiryDate) < today);
            const thisMonthOfficers = officers.filter(officer => new Date(officer.expiryDate).getMonth() === today.getMonth() && new Date(officer.expiryDate).getFullYear() === today.getFullYear());
            const nextMonthOfficers = officers.filter(officer => new Date(officer.expiryDate).getMonth() === (today.getMonth() + 1) % 12 && new Date(officer.expiryDate).getFullYear() === today.getFullYear());
            let content = '';

            if (expiredOfficers.length === 0 && thisMonthOfficers.length === 0 && nextMonthOfficers.length === 0) {
                content = '<p>経過済み・今月・翌月の満了対象はありません。</p>';
            } else {
                content += '<h2>経過済み</h2>' + expiredOfficers.map(officer => `<p>${officer.name} (Expires on: ${officer.expiryDate})</p>`).join('');
                content += '<h2>今月満了予定</h2>' + thisMonthOfficers.map(officer => `<p>${officer.name} (Expires on: ${officer.expiryDate})</p>`).join('');
                content += '<h2>翌月満了予定</h2>' + nextMonthOfficers.map(officer => `<p>${officer.name} (Expires on: ${officer.expiryDate})</p>`).join('');
            }

            document.getElementById('officerList').innerHTML = content;
        }
    </script>
</body>
</html>
